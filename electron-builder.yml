appId: com.claudeworks.app
productName: ClaudeWorks
directories:
  output: release
  buildResources: build
asar: true
# The statusline renderer is invoked via child_process (python3), which
# can't read asar-virtual paths. Unpacking forces electron-builder to place
# these files on disk as real files while still referencing them via the
# normal path join.
asarUnpack:
  - dist/scripts/**
files:
  - dist/**/*
  - package.json
  - "!**/.DS_Store"
  - "!**/*.d.ts"
  - "!**/*.map"
  - "!**/*.tsbuildinfo"
mac:
  category: public.app-category.developer-tools
  target: dmg
  icon: build/icon.icns
  identity: null
